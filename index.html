<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet"/>
    <link rel="stylesheet" href="style/mobile.css">
    <link rel="stylesheet" href="style/telas.css">
</head>
<body>
    <main id="login">
        <section class="imagem"></section>

        <section class="formulario">
            <h1>Login</h1>
            <p>Seja bem-vindo(a) novamente. Faça login para acessar sua conta e poder fazer as configurações no seu ambiente.</p>
            
            <form action="login.php" method="post">
                <div class="campo">
                    <label for="email"><span class="material-symbols-outlined">person</span></label>
                    <input type="email" name="email" id="email" placeholder="seu e-mail" required>
                </div>

                <div class="campo">
                    <label for="senha"><span class="material-symbols-outlined">vpn_key</span></label>
                    <input type="password" name="senha id="senha" placeholder="sua senha" required minlength="8">
                </div>
            </form>
        </section>
    </main>
</body>
</html>
